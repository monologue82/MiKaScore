        // Camera initialization
        async function initCamera() {
            const canvas = document.getElementById('cameraCanvas');
            const ctx = canvas.getContext('2d');
            
            try {
                canvas.width = 1920;
                canvas.height = 1080;
                
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        width: 1920, 
                        height: 1080, 
                        frameRate: 30,
                        facingMode: 'user'
                    }
                });
                
                const video = document.createElement('video');
                video.srcObject = stream;
                video.playsInline = true;
                video.autoplay = true;
                video.muted = true;
                video.width = 1920;
                video.height = 1080;
                
                await new Promise((resolve, reject) => {
                    const timeout = setTimeout(() => {
                        reject(new Error('Video metadata load timeout'));
                    }, 5000);
                    
                    video.onloadedmetadata = () => {
                        clearTimeout(timeout);
                        resolve();
                    };
                    
                    video.onerror = (err) => {
                        clearTimeout(timeout);
                        reject(err);
                    };
                    
                    video.play().catch(err => {
                        clearTimeout(timeout);
                        reject(err);
                    });
                });
                
                console.log('Camera stream obtained:', stream.getTracks());
                console.log('Video dimensions:', video.videoWidth, 'x', video.videoHeight);
                
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                let animationId;
                function drawVideoFrame() {
                    if (video && video.readyState >= 2) {
                        try {
                            ctx.save();
                            ctx.scale(-1, 1);
                            ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
                            ctx.restore();

                            // Draw skeleton if available
                            if (state.lastPoseResults && state.lastPoseResults.poseLandmarks) {
                                const mirroredLandmarks = mirrorLandmarks(state.lastPoseResults.poseLandmarks);
                                
                                mirroredLandmarks.forEach((landmark, index) => {
                                    const x = landmark.x * canvas.width;
                                    const y = landmark.y * canvas.height;
                                    
                                    ctx.beginPath();
                                    ctx.arc(x, y, 5, 0, 2 * Math.PI);
                                    ctx.fillStyle = '#4ade80';
                                    ctx.fill();
                                    ctx.strokeStyle = '#1e293b';
                                    ctx.lineWidth = 2;
                                    ctx.stroke();
                                });
                                
                                const connections = [
                                    [12, 14], [14, 16], [11, 13], [13, 15],
                                    [11, 23], [24, 26], [26, 28], [23, 25], [25, 27]
                                ];
                                
                                ctx.strokeStyle = '#38bdf8';
                                ctx.lineWidth = 3;
                                
                                connections.forEach(([i, j]) => {
                                    if (mirroredLandmarks[i] && mirroredLandmarks[j]) {
                                        const start = mirroredLandmarks[i];
                                        const end = mirroredLandmarks[j];
                                        
                                        ctx.beginPath();
                                        ctx.moveTo(start.x * canvas.width, start.y * canvas.height);
                                        ctx.lineTo(end.x * canvas.width, end.y * canvas.height);
                                        ctx.stroke();
                                    }
                                });
                            }
                        } catch (err) {
                            console.error('Draw frame error:', err);
                        }
                    }
                    animationId = requestAnimationFrame(drawVideoFrame);
                }
                drawVideoFrame();
                
                try {
                    await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js');
                } catch (err) {
                    console.error('Failed to load MediaPipe Pose from CDN, trying alternative URL...');
                    // Try alternative CDN
                    try {
                        await loadScript('https://unpkg.com/@mediapipe/pose@0.5.1675469404/pose.js');
                    } catch (err2) {
                        console.error('Failed to load MediaPipe Pose:', err2);
                        throw new Error('MediaPipe Pose failed to load. Please check your network connection.');
                    }
                }
                
                if (!window.Pose) {
                    throw new Error('MediaPipe Pose not loaded');
                }
                
                const pose = new Pose({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`
                });
                
                pose.setOptions({
                    modelComplexity: 1,
                    smoothLandmarks: true,
                    enableSegmentation: false,
                    smoothSegmentation: true,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });
                
                pose.onResults((results) => {
                    // Store results for drawing in drawVideoFrame
                    state.lastPoseResults = results;

                    // Check if person is detected (完善后的严格标准)
                    let currentFrameHasPerson = false;
                    if (results.poseLandmarks) {
                        // 上半身关键点：头、肩、手肘、手腕
                        const upperBodyLandmarks = [0, 11, 12, 13, 14, 15, 16];
                        // 下半身关键点：臀、膝、脚踝
                        const lowerBodyLandmarks = [23, 24, 25, 26, 27, 28];

                        let upperVisibleCount = 0;
                        let lowerVisibleCount = 0;
                        let totalVisibility = 0;

                        upperBodyLandmarks.forEach(idx => {
                            if (results.poseLandmarks[idx] && results.poseLandmarks[idx].visibility > 0.5) {
                                upperVisibleCount++;
                                totalVisibility += results.poseLandmarks[idx].visibility;
                            }
                        });

                        lowerBodyLandmarks.forEach(idx => {
                            if (results.poseLandmarks[idx] && results.poseLandmarks[idx].visibility > 0.5) {
                                lowerVisibleCount++;
                                totalVisibility += results.poseLandmarks[idx].visibility;
                            }
                        });

                        const totalVisible = upperVisibleCount + lowerVisibleCount;
                        const avgVisibility = totalVisible > 0 ? totalVisibility / totalVisible : 0;

                        // 要求：上半身至少5个点可见，下半身至少4个点可见，平均可见度 > 0.55
                        if (upperVisibleCount >= 5 && lowerVisibleCount >= 4 && avgVisibility > 0.55) {
                            currentFrameHasPerson = true;
                            state.personDetected = true;
                        }
                    }

                    // 骨骼绑定跟踪：只有在等待阶段才跟踪
                    if (state.waitingForPerson) {
                        if (currentFrameHasPerson) {
                            state.boneBindingFrames++;
                            // 连续15帧检测到人（大约0.5秒），认为骨骼绑定完成
                            if (state.boneBindingFrames >= 15) {
                                state.boneBindingComplete = true;
                            }
                        } else {
                            // 没有人时重置计数
                            state.boneBindingFrames = 0;
                            state.boneBindingComplete = false;
                        }
                    }

                    // 如果当前帧没有人，且不在等待阶段，标记 personDetected 为 false
                    if (!currentFrameHasPerson && !state.waitingForPerson) {
                        state.personDetected = false;
                    }

                    // BPM-based scoring: only calculate score at regular intervals
                    if (results.poseLandmarks && state.isPlaying && !state.isPaused && state.personDetected) {
                        const currentTime = performance.now();
                        const interval = 60000 / state.detectedBPM; // BPM-based interval
                        if (!state.lastScoreTime || currentTime - state.lastScoreTime >= interval) {
                            state.lastScoreTime = currentTime;
                            const mirrored = mirrorLandmarks(results.poseLandmarks);
                            const smoothed = smoothLandmarks(mirrored, state.smoothingFactor);
                            calculateScore(smoothed);
                        }
                    }
                });
                
                state.pose = pose;
                console.log('开始摄像头处理...');

                // 使用requestAnimationFrame直接处理，不使用Camera类
                async function processFrame() {
                    if (!state.pose) return;

                    if (video.readyState >= 2) {
                        try {
                            await pose.send({ image: video });
                        } catch (err) {
                            if (err.message !== 'The video is not ready.') {
                                console.error('Pose send error:', err);
                            }
                        }
                    }

                    requestAnimationFrame(processFrame);
                }

                processFrame();
                console.log('摄像头处理启动成功');
                
                state.video = video;
                state.stream = stream;
                state.animationId = animationId;
                
                console.log('Camera initialized successfully');
                
            } catch (error) {
                console.error('Camera init failed:', error);
                ctx.fillStyle = '#f8fafc';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ef4444';
                ctx.font = '16px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('摄像头初始化失败:', canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillStyle = '#1e293b';
                ctx.font = '14px sans-serif';
                ctx.fillText(error.message, canvas.width / 2, canvas.height / 2);
                ctx.fillText('请检查摄像头权限', canvas.width / 2, canvas.height / 2 + 20);
            }
        }

        // MediaPipe 到 MMD 骨骼名称映射
        const MEDIAPIPE_TO_MMD_MAP = {
            0: '頭',           // 鼻子 → 頭
            11: '左肩',        // 左肩膀
            12: '右肩',        // 右肩膀
            13: '左腕',        // 左肘 → 左腕
            14: '右腕',        // 右肘 → 右腕
            15: '左手首',      // 左手腕
            16: '右手首',      // 右手腕
            23: '左足',        // 左臀 → 左足
            24: '右足',        // 右臀 → 右足
            25: '左ひざ',      // 左膝
            26: '右ひざ',      // 右膝
            27: '左足首',      // 左脚踝
            28: '右足首'       // 右脚踝
        };

        // MMD 骨骼名称到 MediaPipe 索引的映射
        const MMD_TO_MEDIAPIPE_MAP = {
            '頭': 0,
            '左肩': 11,
            '右肩': 12,
            '左腕': 13,
            '右腕': 14,
            '左手首': 15,
            '右手首': 16,
            '左足': 23,
            '右足': 24,
            '左ひざ': 25,
            '右ひざ': 26,
            '左足首': 27,
            '右足首': 28
        };

        // 将 MediaPipe 2D 坐标转换为 3D 向量
        function mediapipeLandmarkTo3D(landmark) {
            return {
                x: (landmark.x - 0.5) * 200,  // 归一化 → -100~100 厘米
                y: -(landmark.y - 0.5) * 200, // Y轴翻转
                z: landmark.z * 100           // Z轴
            };
        }

        // 从音频提取 BPM
        async function detectBPMFromAudio(audioPath) {
            try {
                const response = await fetch(audioPath);
                const arrayBuffer = await response.arrayBuffer();
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

                const rawData = audioBuffer.getChannelData(0);
                const samples = rawData.length;
                const sampleRate = audioBuffer.sampleRate;

                // 使用简化的节拍检测算法
                const interval = Math.floor(sampleRate / 10); // 分析前10秒
                const peaks = [];
                const threshold = 0.8;

                let maxVal = 0;
                for (let i = 0; i < interval; i++) {
                    if (Math.abs(rawData[i]) > maxVal) maxVal = Math.abs(rawData[i]);
                }
                const cutoff = maxVal * threshold;

                let lastPeak = -1;
                let minPeakDistance = Math.floor(sampleRate * 60 / 200); // 最小间隔对应200BPM

                for (let i = 0; i < interval; i++) {
                    if (Math.abs(rawData[i]) > cutoff) {
                        if (lastPeak === -1 || i - lastPeak > minPeakDistance) {
                            peaks.push(i);
                            lastPeak = i;
                        }
                    }
                }

                if (peaks.length < 2) {
                    state.detectedBPM = 120;
                    return;
                }

                // 计算峰值间平均间隔
                let totalInterval = 0;
                for (let i = 1; i < peaks.length; i++) {
                    totalInterval += peaks[i] - peaks[i - 1];
                }
                const avgInterval = totalInterval / (peaks.length - 1);
                const bpm = Math.round((60 * sampleRate) / avgInterval);

                state.detectedBPM = Math.max(60, Math.min(200, bpm));
                console.log('Detected BPM:', state.detectedBPM);
            } catch (error) {
                console.warn('BPM detection failed, using default:', error);
                state.detectedBPM = 120;
            }
        }

        // 镜像骨骼数据（因为摄像头画面是镜像的，用户看镜子跳舞）
        function mirrorLandmarks(landmarks) {
            if (!landmarks) return [];
            return landmarks.map(landmark => ({
                ...landmark,
                x: 1 - landmark.x  // 镜像 X 坐标
            }));
        }

        // 时序平滑 - 减少骨骼抖动（指数移动平均）
        function smoothLandmarks(newLandmarks, smoothingFactor = 0.7) {
            if (!newLandmarks) return null;

            if (!state.smoothedLandmarks) {
                state.smoothedLandmarks = JSON.parse(JSON.stringify(newLandmarks));
                return state.smoothedLandmarks;
            }

            for (let i = 0; i < newLandmarks.length; i++) {
                if (newLandmarks[i] && state.smoothedLandmarks[i]) {
                    state.smoothedLandmarks[i].x = state.smoothedLandmarks[i].x * (1 - smoothingFactor) + newLandmarks[i].x * smoothingFactor;
                    state.smoothedLandmarks[i].y = state.smoothedLandmarks[i].y * (1 - smoothingFactor) + newLandmarks[i].y * smoothingFactor;
                    state.smoothedLandmarks[i].z = state.smoothedLandmarks[i].z * (1 - smoothingFactor) + newLandmarks[i].z * smoothingFactor;
                    state.smoothedLandmarks[i].visibility = state.smoothedLandmarks[i].visibility * (1 - smoothingFactor) + newLandmarks[i].visibility * smoothingFactor;
                } else if (newLandmarks[i]) {
                    state.smoothedLandmarks[i] = { ...newLandmarks[i] };
                }
            }
            return state.smoothedLandmarks;
        }

        // 获取 MMD 模型的骨骼 3D 位置（考虑镜像模式）
        function getMMDBonePositions(mirrorMode = true) {
            if (!state.model) return null;
            
            const positions = {};
            for (const [boneName, mpIndex] of Object.entries(MMD_TO_MEDIAPIPE_MAP)) {
                const pos = state.model.getBoneWorldPosition(boneName);
                if (pos) {
                    let x = pos.x;
                    // 在镜像模式下，用户的左右是颠倒的，所以需要镜像 MMD 的 X 坐标
                    if (mirrorMode) {
                        x = -x;
                    }
                    positions[mpIndex] = {
                        x: x,
                        y: pos.y,
                        z: pos.z
                    };
                }
            }
            return positions;
        }

        // 获取当前动画帧时间
        function getCurrentAnimationTime() {
            if (!state.model || !state.model.animationState) return 0;
            return state.model.animationState.getCurrentTime();
        }

        // 计算两点间的欧氏距离
        function distance3D(a, b) {
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            const dz = a.z - b.z;
            return Math.sqrt(dx * dx + dy * dy + dz * dz);
        }

        // 归一化向量
        function normalizeVector(v) {
            const mag = Math.sqrt(v.x * v.x + v.y * v.y + v.z * v.z);
            if (mag === 0) return { x: 0, y: 0, z: 0 };
            return { x: v.x / mag, y: v.y / mag, z: v.z / mag };
        }

        // 计算两个向量之间的角度（弧度）
        function angleBetweenVectors(a, b) {
            const dot = a.x * b.x + a.y * b.y + a.z * b.z;
            const magA = Math.sqrt(a.x * a.x + a.y * a.y + a.z * a.z);
            const magB = Math.sqrt(b.x * b.x + b.y * b.y + b.z * b.z);
            if (magA === 0 || magB === 0) return 0;
            return Math.acos(Math.max(-1, Math.min(1, dot / (magA * magB))));
        }

        // 计算角度差异（用于关节）
        function angleDifference(landmarks, mpIdx1, mpIdx2, mpIdx3) {
            if (!landmarks[mpIdx1] || !landmarks[mpIdx2] || !landmarks[mpIdx3]) return null;
            
            const a = mediapipeLandmarkTo3D(landmarks[mpIdx1]);
            const b = mediapipeLandmarkTo3D(landmarks[mpIdx2]);
            const c = mediapipeLandmarkTo3D(landmarks[mpIdx3]);
            
            const ba = { x: a.x - b.x, y: a.y - b.y, z: a.z - b.z };
            const bc = { x: c.x - b.x, y: c.y - b.y, z: c.z - b.z };
            
            const dot = ba.x * bc.x + ba.y * bc.y + ba.z * bc.z;
            const magBA = Math.sqrt(ba.x * ba.x + ba.y * ba.y + ba.z * ba.z);
            const magBC = Math.sqrt(bc.x * bc.x + bc.y * bc.y + bc.z * bc.z);
            
            if (magBA === 0 || magBC === 0) return null;
            
            return Math.acos(Math.max(-1, Math.min(1, dot / (magBA * magBC))));
        }

        // 计算关节角度差异
        function calculateJointAngleScore(mediapipeLandmarks, mmdPositions) {
            // 左肘角度: 肩(11) - 肘(13) - 腕(15)
            // 右肘角度: 肩(12) - 肘(14) - 腕(16)
            // 左膝角度: 臀(23) - 膝(25) - 踝(27)
            // 右膝角度: 臀(24) - 膝(26) - 踝(28)
            const jointTriplets = [
                { shoulder: 11, joint: 13, wrist: 15, name: '左肘' },
                { shoulder: 12, joint: 14, wrist: 16, name: '右肘' },
                { shoulder: 23, joint: 25, wrist: 27, name: '左膝' },
                { shoulder: 24, joint: 26, wrist: 28, name: '右膝' }
            ];

            let angleScore = 0;
            let validJoints = 0;

            jointTriplets.forEach(({ shoulder, joint, wrist }) => {
                const mp = mediapipeLandmarks;
                if (mp[shoulder] && mp[joint] && mp[wrist] && 
                    mp[shoulder].visibility > 0.35 && mp[joint].visibility > 0.35 && mp[wrist].visibility > 0.35) {
                    
                    // 计算 MediaPipe 角度
                    const mpAngle = angleDifference(mp, shoulder, joint, wrist);
                    
                    // 计算 MMD 角度
                    const mmdAngle = angleDifference(mmdPositions, shoulder, joint, wrist);
                    
                    if (mpAngle !== null && mmdAngle !== null) {
                        const angleDiff = Math.abs(mpAngle - mmdAngle);
                        // 角度差异越小分数越高 (180度以内)
                        const jointScore = Math.max(0, 1 - angleDiff / Math.PI);
                        angleScore += jointScore;
                        validJoints++;
                    }
                }
            });

            return validJoints > 0 ? angleScore / validJoints : 0;
        }

        // 计算动作匹配得分（实时对比舞蹈动画）
        function calculateMotionScore(mediapipeLandmarks) {
            if (!mediapipeLandmarks) {
                return { score: 0, rating: 'Miss' };
            }

            const mmdPositions = getMMDBonePositions(true); // 镜像模式
            if (!mmdPositions) {
                // 如果没有 MMD 模型，返回基于可见性的得分
                return { score: 0, rating: 'Miss' };
            }

            // ========== 位置评分 ==========
            let totalDiff = 0;
            let validCount = 0;

            // 关键骨骼对应关系（MediaPipe 索引 -> 权重）
            const keyBoneWeights = {
                11: 0.10,  // 左肩
                12: 0.10,  // 右肩
                13: 0.08,   // 左肘
                14: 0.08,   // 右肘
                15: 0.10,   // 左手腕
                16: 0.10,   // 右手腕
                23: 0.08,   // 左臀
                24: 0.08,   // 右臀
                25: 0.06,   // 左膝
                26: 0.06,   // 右膝
                27: 0.06,   // 左脚踝
                28: 0.06    // 右脚踝
            };

            // 归一化因子：肩膀间距离
            const getShoulderWidth = (landmarks) => {
                if (!landmarks[11] || !landmarks[12]) return 1;
                const dx = landmarks[11].x - landmarks[12].x;
                const dy = landmarks[11].y - landmarks[12].y;
                const dz = landmarks[11].z - landmarks[12].z;
                return Math.sqrt(dx * dx + dy * dy + dz * dz) || 1;
            };

            const mpShoulderWidth = getShoulderWidth(mediapipeLandmarks);
            const mmdShoulderWidth = getShoulderWidth(mmdPositions);
            const scaleFactor = mmdShoulderWidth / mpShoulderWidth || 1;

            // 计算各关键点差异
            for (const [mpIndexStr, weight] of Object.entries(keyBoneWeights)) {
                const idx = parseInt(mpIndexStr);
                const mpLandmark = mediapipeLandmarks[idx];
                const mmdPos = mmdPositions[idx];

                if (mpLandmark && mmdPos && mpLandmark.visibility > 0.35) {
                    const mp3D = mediapipeLandmarkTo3D(mpLandmark);

                    // 缩放用户位置以匹配 MMD 模型比例
                    const scaledMp = {
                        x: mp3D.x * scaleFactor,
                        y: mp3D.y * scaleFactor,
                        z: mp3D.z * scaleFactor
                    };

                    // 计算差异
                    const diff = distance3D(scaledMp, mmdPos);
                    totalDiff += diff * weight;
                    validCount++;
                }
            }

            // 位置得分 (0-1)
            let positionScore = 0;
            if (validCount === 0) {
                return { score: 0, rating: 'Miss', positionScore: 0, angleScore: 0 };
            }
            const avgDiff = totalDiff / validCount;
            const maxDiff = 120; // 厘米
            positionScore = Math.max(0, Math.min(1, 1 - avgDiff / maxDiff));

            // ========== 关节角度评分 ==========
            const angleScore = calculateJointAngleScore(mediapipeLandmarks, mmdPositions);

            // ========== 综合评分 ==========
            // 位置占 60%，角度占 40%
            const combinedScore = positionScore * 0.6 + angleScore * 0.4;

            // 低于 0.3 的综合得分视为 Miss（用户动作与目标差距太大）
            if (combinedScore < 0.3) {
                return { score: 0, rating: 'Miss', positionScore, angleScore };
            }

            // 计算最终得分 (0-10)
            const score = Math.round(combinedScore * 10 * 10) / 10;

            // 确定评级
            let rating;
            if (score >= 7) rating = 'Perfect';
            else if (score >= 5) rating = 'Great';
            else if (score >= 3) rating = 'Good';
            else rating = 'Bad';

            return { score, rating, positionScore, angleScore };
        }

        function calculateScore(landmarks) {
            const { score, rating } = calculateMotionScore(landmarks);
            
            showRating(rating);
            
            // Combo system: increase combo for good ratings, reset for Bad/Miss
            if (rating === 'Perfect' || rating === 'Great' || rating === 'Good') {
                state.combo++;
                if (state.combo > state.maxCombo) state.maxCombo = state.combo;
                state.streak++;
            } else {
                state.combo = 0;
                state.streak = 0;
            }
            
            // Difficulty coefficient (based on motion speed/complexity - simplified as BPM/120)
            const difficultyCoef = state.detectedBPM / 120;
            state.difficulty = Math.max(0.5, Math.min(2.0, difficultyCoef));
            
            // Combo multiplier: 1x base, +0.1x per combo up to 2x max
            const comboMultiplier = 1 + Math.min(state.combo * 0.05, 1);
            
            // Calculate points with all modifiers
            const scoreMap = { Perfect: 10, Great: 8, Good: 5, Bad: 2, Miss: 0 };
            const basePoints = scoreMap[rating];
            const finalPoints = Math.round(basePoints * comboMultiplier * state.difficulty);
            
            state.score += finalPoints;
            state.score = Math.min(state.score, 99999);
            
            document.getElementById('scoreValue').textContent = state.score;
            updateScoreDisplay();
        }
        
        function updateScoreDisplay() {
            const comboDisplay = document.getElementById('comboDisplay');
            if (comboDisplay) {
                comboDisplay.textContent = state.combo > 0 ? `${state.combo} Combo` : '';
                comboDisplay.className = state.combo > 0 ? 'combo-display visible' : 'combo-display';
            }
            const bpmDisplay = document.getElementById('bpmDisplay');
            if (bpmDisplay) {
                bpmDisplay.textContent = `BPM: ${state.detectedBPM}`;
            }
        }

        function showRating(rating) {
            const display = document.getElementById('ratingDisplay');
            display.textContent = rating;
            display.className = 'rating-display show ' + rating.toLowerCase();
            
            setTimeout(() => {
                display.classList.remove('show');
            }, 800);
        }

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        function showMotionUploadDialog() {
            document.getElementById('motionFileInput').click();
        }

        function showModelUploadDialog() {
            document.getElementById('modelFileInput').click();
        }

        document.getElementById('motionFileInput').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            console.log('Uploaded motion files:', files);
            
            if (files.length === 0) return;
            
            try {
                const formData = new FormData();
                files.forEach(file => {
                    formData.append('files', file);
                });
                
                const response = await fetch('/api/upload-motion', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Upload failed');
                }
                
                const result = await response.json();
                console.log('Motion uploaded:', result);
                
                alert('动作上传成功！');
                
                // Reload motions to show the new one
                await loadMotions();
                
            } catch (error) {
                console.error('Failed to upload motion:', error);
                alert('动作上传失败：' + error.message);
            }
            
            e.target.value = '';
        });

        document.getElementById('modelFileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            try {
                const formData = new FormData();
                formData.append('file', file);
                
                const response = await fetch('/api/upload-model', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Upload failed');
                }
                
                const result = await response.json();
                console.log('Model uploaded:', result);
                
                // Add model to list
                const models = getSavedModels();
                const existingIndex = models.findIndex(m => m.name === result.name);
                
                if (existingIndex >= 0) {
                    models[existingIndex] = {
                        name: result.name,
                        path: result.path,
                        isFolder: result.isFolder,
                        folderPath: result.folderPath
                    };
                } else {
                    models.push({
                        name: result.name,
                        path: result.path,
                        isFolder: result.isFolder,
                        folderPath: result.folderPath
                    });
                }
                saveModels(models);
                
                // Update select dropdown
                updateModelSelect();
                
                // Select the new model
                const select = document.getElementById('modelSelect');
                select.value = result.name;
                saveSelectedModel(result.name);
                
                alert('模型上传成功！');
                
            } catch (error) {
                console.error('Failed to upload model:', error);
                alert('模型上传失败：' + error.message);
            }
            
            e.target.value = '';
        });

        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('show');
        }

        // Model management
        const DEFAULT_MODEL = '塞尔凯特';
        const STORAGE_KEY_MODELS = 'mikaScoreModels';
        const STORAGE_KEY_SELECTED_MODEL = 'mikaScoreSelectedModel';

        function getSavedModels() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY_MODELS);
                return saved ? JSON.parse(saved) : [];
            } catch (e) {
                console.warn('Failed to load saved models:', e);
                return [];
            }
        }

        function saveModels(models) {
            try {
                localStorage.setItem(STORAGE_KEY_MODELS, JSON.stringify(models));
            } catch (e) {
                console.warn('Failed to save models:', e);
            }
        }

        function getSelectedModel() {
            try {
                return localStorage.getItem(STORAGE_KEY_SELECTED_MODEL) || DEFAULT_MODEL;
            } catch (e) {
                return DEFAULT_MODEL;
            }
        }

        function saveSelectedModel(modelName) {
            try {
                localStorage.setItem(STORAGE_KEY_SELECTED_MODEL, modelName);
            } catch (e) {
                console.warn('Failed to save selected model:', e);
            }
        }

        function onModelChange() {
            const select = document.getElementById('modelSelect');
            const selectedModel = select.value;
            saveSelectedModel(selectedModel);
            console.log('Model selected:', selectedModel);
        }

        async function handleModelUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                // Create form data
                const formData = new FormData();
                formData.append('file', file);

                // Upload model to server
                const response = await fetch('/api/upload-model', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Upload failed');
                }

                const result = await response.json();
                console.log('Model uploaded:', result);

                // Add model to list
                const models = getSavedModels();
                const existingIndex = models.findIndex(m => m.name === result.name);
                
                if (existingIndex >= 0) {
                    models[existingIndex] = {
                        name: result.name,
                        path: result.path,
                        isFolder: result.isFolder,
                        folderPath: result.folderPath
                    };
                } else {
                    models.push({
                        name: result.name,
                        path: result.path,
                        isFolder: result.isFolder,
                        folderPath: result.folderPath
                    });
                }
                saveModels(models);

                // Update select dropdown
                updateModelSelect();

                // Select the new model
                const select = document.getElementById('modelSelect');
                select.value = result.name;
                saveSelectedModel(result.name);

                alert('模型上传成功！');

            } catch (error) {
                console.error('Failed to upload model:', error);
                alert('模型上传失败：' + error.message);
            }

            // Clear input
            event.target.value = '';
        }

        function updateModelSelect() {
            const select = document.getElementById('modelSelect');
            const savedModels = getSavedModels();
            const selectedModel = getSelectedModel();

            // Clear existing options except the default
            select.innerHTML = `<option value="塞尔凯特">塞尔凯特</option>`;

            // Add custom models
            savedModels.forEach(model => {
                const option = document.createElement('option');
                option.value = model.name;
                option.textContent = model.name + ' (自定义)';
                select.appendChild(option);
            });

            // Restore selection
            select.value = selectedModel;
        }

        function getCurrentModelPath() {
            const selectedModel = getSelectedModel();
            const savedModels = getSavedModels();
            const customModel = savedModels.find(m => m.name === selectedModel);

            if (customModel) {
                // If it's a folder-based model, the path is just the folder path + model name
                if (customModel.isFolder) {
                    return `${customModel.folderPath}/${selectedModel}.pmx`;
                }
                return customModel.path;
            }

            // Default model path
            return `/mmd/models/${selectedModel}/${selectedModel}.pmx`;
        }

        document.addEventListener('keydown', (e) => {
            if (e.target instanceof HTMLInputElement || e.target instanceof HTMLTextAreaElement) return;
            if (e.code !== 'Space' && e.key !== ' ') return;
            e.preventDefault();
            
            if (state.currentPage === 'mainPage') {
                if (state.isPlaying && !state.isPaused) handlePause();
                else if (state.isPaused) handleResume();
                else handlePlay();
            } else if (state.currentPage === 'playerPage') {
                togglePlayPause();
            }
        });

        async function initializeSystem() {
            await loadMotions();
            updateModelSelect(); // Initialize model select dropdown
            
            setTimeout(() => {
                showPage('mainPage');
                initRezeEngine();
            }, 2000);
        }

        window.addEventListener('load', initializeSystem);
        
        window.showPage = showPage;
        window.startDance = startDance;
        window.togglePlayPause = togglePlayPause;
        window.stopAndReturn = stopAndReturn;
        window.toggleSettings = toggleSettings;
        window.showMotionUploadDialog = showMotionUploadDialog;
        window.showModelUploadDialog = showModelUploadDialog;
        window.toggleMainOfficialMotion = toggleMainOfficialMotion;
        window.selectOfficialMotion = selectOfficialMotion;
    </script>
