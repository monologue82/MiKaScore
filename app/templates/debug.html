<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiKaScore - 骨骼绑定调试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e293b;
            color: white;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #4ade80, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .debug-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .debug-panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .debug-panel h2 {
            margin-bottom: 15px;
            color: #4ade80;
        }

        #cameraCanvas {
            width: 100%;
            height: 480px;
            border-radius: 8px;
            border: 2px solid #4ade80;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
        }

        .info-item strong {
            color: #38bdf8;
        }

        .skeleton-info {
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.4;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-active {
            background: #4ade80;
        }

        .status-inactive {
            background: #ef4444;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .control-button {
            background: linear-gradient(135deg, #4ade80, #38bdf8);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .control-button:hover {
            transform: translateY(-2px);
        }

        .console-log {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #4ade80;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }

        .landmark-point {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            border: 2px solid white;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .landmark-line {
            position: absolute;
            background: #38bdf8;
            height: 2px;
            transform-origin: left center;
            z-index: 5;
        }

        #cameraContainer {
            position: relative;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MiKaScore - 骨骼绑定调试</h1>

        <div class="controls">
            <button class="control-button" onclick="startCamera()">启动摄像头</button>
            <button class="control-button" onclick="stopCamera()">停止摄像头</button>
            <button class="control-button" onclick="toggleSkeleton()">切换骨骼显示</button>
        </div>

        <div class="debug-grid">
            <div class="debug-panel">
                <h2>摄像头画面</h2>
                <div id="cameraContainer">
                    <canvas id="cameraCanvas"></canvas>
                </div>
                <div class="info-grid">
                    <div class="info-item">
                        <strong>摄像头状态:</strong>
                        <span id="cameraStatus"><span class="status-indicator status-inactive"></span>未启动</span>
                    </div>
                    <div class="info-item">
                        <strong>人体检测:</strong>
                        <span id="detectionStatus"><span class="status-indicator status-inactive"></span>未检测</span>
                    </div>
                    <div class="info-item">
                        <strong>骨骼点数:</strong>
                        <span id="landmarkCount">0</span>
                    </div>
                    <div class="info-item">
                        <strong>可见点数:</strong>
                        <span id="visibleCount">0</span>
                    </div>
                    <div class="info-item">
                        <strong>处理帧数:</strong>
                        <span id="frameCount">0</span>
                    </div>
                    <div class="info-item">
                        <strong>视频就绪状态:</strong>
                        <span id="videoReady">0</span>
                    </div>
                </div>
                <div class="console-log" id="consoleLog">
                    控制台日志:
                </div>
            </div>

            <div class="debug-panel">
                <h2>骨骼信息</h2>
                <div class="skeleton-info" id="skeletonInfo">
                    等待摄像头启动...
                </div>
            </div>
        </div>

        <div class="debug-panel">
            <h2>绑定骨骼映射</h2>
            <div class="skeleton-info" id="bindingInfo">
                <strong>MediaPipe → MMD 骨骼映射:</strong>
                <pre>
头部: 0 (鼻子)
颈部: 1 (颈部)
肩部: 11, 12 (左肩, 右肩)
肘部: 13, 14 (左肘, 右肘)
手腕: 15, 16 (左手腕, 右手腕)
腰部: 23, 24 (左臀, 右臀)
膝盖: 25, 26 (左膝, 右膝)
脚踝: 27, 28 (左脚踝, 右脚踝)
                </pre>
            </div>
        </div>
    </div>

    <script>
        const state = {
            video: null,
            stream: null,
            animationId: null,
            showSkeleton: true,
            landmarks: null,
            frameCount: 0,
            pose: null
        };

        function log(message) {
            const logElement = document.getElementById('consoleLog');
            logElement.textContent += '\n' + new Date().toLocaleTimeString() + ': ' + message;
            logElement.scrollTop = logElement.scrollHeight;
            console.log(message);
        }

        async function startCamera() {
            log('开始初始化摄像头...');
            const canvas = document.getElementById('cameraCanvas');
            const ctx = canvas.getContext('2d');

            try {
                canvas.width = 640;
                canvas.height = 480;

                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error('您的浏览器不支持摄像头功能');
                }

                log('请求摄像头权限...');
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: 640,
                        height: 480,
                        frameRate: 30,
                        facingMode: 'user'
                    }
                });

                log('摄像头权限获取成功');

                const video = document.createElement('video');
                video.srcObject = stream;
                video.playsInline = true;
                video.autoplay = true;
                video.muted = true;
                video.width = 640;
                video.height = 480;

                log('等待视频元数据加载...');
                await new Promise((resolve, reject) => {
                    if (video.readyState >= 2) {
                        log('视频已经就绪，readyState=' + video.readyState);
                        resolve();
                        return;
                    }

                    video.onloadedmetadata = () => {
                        log('视频元数据加载完成');
                        video.play().catch(err => log('播放错误: ' + err.message));
                        resolve();
                    };

                    video.onerror = (err) => {
                        log('视频加载错误: ' + err.message);
                        reject(err);
                    };

                    setTimeout(() => {
                        if (video.readyState < 2) {
                            log('视频加载超时，强制继续');
                            resolve();
                        }
                    }, 5000);
                });

                await new Promise((resolve) => {
                    const checkReady = () => {
                        document.getElementById('videoReady').textContent = video.readyState;
                        if (video.readyState >= 2) {
                            log('视频就绪状态: ' + video.readyState);
                            resolve();
                        } else {
                            setTimeout(checkReady, 100);
                        }
                    };
                    checkReady();
                });

                document.getElementById('cameraStatus').innerHTML = '<span class="status-indicator status-active"></span>运行中';

                let animationId;
                function drawVideoFrame() {
                    if (video && video.readyState >= 2) {
                        try {
                            ctx.save();
                            ctx.scale(-1, 1);
                            ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
                            ctx.restore();

                            if (state.landmarks && state.showSkeleton) {
                                const mirroredLandmarks = mirrorLandmarks(state.landmarks);
                                drawSkeleton(ctx, mirroredLandmarks, canvas.width, canvas.height);
                            }
                        } catch (err) {
                            // 忽略绘制错误
                        }
                    }
                    animationId = requestAnimationFrame(drawVideoFrame);
                }
                drawVideoFrame();
                log('视频帧绘制开始');

                // 使用最新版本的 MediaPipe Pose
                log('加载 MediaPipe Pose 库 (最新版本)...');
                await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js');

                if (!window.Pose) {
                    throw new Error('MediaPipe Pose not loaded');
                }

                log('MediaPipe Pose 库加载成功');

                const pose = new Pose({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`
                });

                pose.setOptions({
                    modelComplexity: 1,
                    smoothLandmarks: true,
                    enableSegmentation: false,
                    smoothSegmentation: true,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });

                log('Pose 检测初始化完成');

                pose.onResults((results) => {
                    log('收到检测结果');
                    if (results.poseLandmarks) {
                        log('检测到 ' + results.poseLandmarks.length + ' 个骨骼点');
                        state.landmarks = results.poseLandmarks;
                        updateSkeletonInfo(results.poseLandmarks);
                        updateDetectionStatus(results.poseLandmarks);
                    } else {
                        log('未检测到骨骼');
                        document.getElementById('detectionStatus').innerHTML = '<span class="status-indicator status-inactive"></span>未检测';
                        document.getElementById('landmarkCount').textContent = '0';
                        document.getElementById('visibleCount').textContent = '0';
                    }
                });

                state.pose = pose;
                log('开始摄像头处理...');

                // 使用requestAnimationFrame直接处理
                async function processFrame() {
                    if (!state.pose) return;

                    state.frameCount++;
                    document.getElementById('frameCount').textContent = state.frameCount;

                    if (video.readyState >= 2) {
                        try {
                            await pose.send({ image: video });
                        } catch (err) {
                            if (err.message !== 'The video is not ready.') {
                                log('Pose send error: ' + err.message);
                            }
                        }
                    }

                    requestAnimationFrame(processFrame);
                }

                processFrame();
                log('摄像头处理启动成功');

                state.video = video;
                state.stream = stream;
                state.animationId = animationId;

            } catch (error) {
                log('摄像头初始化失败: ' + error.message);
                console.error('Camera init failed:', error);
                document.getElementById('cameraStatus').innerHTML = '<span class="status-indicator status-inactive"></span>失败';
                ctx.fillStyle = '#f8fafc';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ef4444';
                ctx.font = '16px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('摄像头初始化失败:', canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillStyle = '#1e293b';
                ctx.font = '14px sans-serif';
                ctx.fillText(error.message, canvas.width / 2, canvas.height / 2);
                ctx.fillText('请检查摄像头权限', canvas.width / 2, canvas.height / 2 + 20);
            }
        }

        function stopCamera() {
            log('停止摄像头...');
            if (state.stream) {
                state.stream.getTracks().forEach(track => track.stop());
            }
            if (state.animationId) {
                cancelAnimationFrame(state.animationId);
            }
            if (state.pose) {
                state.pose.close();
            }

            document.getElementById('cameraStatus').innerHTML = '<span class="status-indicator status-inactive"></span>已停止';
            document.getElementById('detectionStatus').innerHTML = '<span class="status-indicator status-inactive"></span>未检测';
            document.getElementById('landmarkCount').textContent = '0';
            document.getElementById('visibleCount').textContent = '0';
            document.getElementById('frameCount').textContent = '0';
            document.getElementById('skeletonInfo').textContent = '摄像头已停止';

            const canvas = document.getElementById('cameraCanvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#64748b';
            ctx.font = '16px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('摄像头已停止', canvas.width / 2, canvas.height / 2);

            log('摄像头已停止');
        }

        function toggleSkeleton() {
            state.showSkeleton = !state.showSkeleton;
            log('骨骼显示: ' + (state.showSkeleton ? '开启' : '关闭'));
        }

        // MediaPipe 到 MMD 骨骼名称映射
        const MEDIAPIPE_TO_MMD_MAP = {
            0: '頭',           // 鼻子 → 頭
            11: '左肩',        // 左肩膀
            12: '右肩',        // 右肩膀
            13: '左腕',        // 左肘 → 左腕
            14: '右腕',        // 右肘 → 右腕
            15: '左手首',      // 左手腕
            16: '右手首',      // 右手腕
            23: '左足',        // 左臀 → 左足
            24: '右足',        // 右臀 → 右足
            25: '左ひざ',      // 左膝
            26: '右ひざ',      // 右膝
            27: '左足首',      // 左脚踝
            28: '右足首'       // 右脚踝
        };

        // 镜像骨骼数据（因为摄像头画面是镜像的，用户看镜子跳舞）
        function mirrorLandmarks(landmarks) {
            if (!landmarks) return null;
            return landmarks.map(landmark => ({
                ...landmark,
                x: 1 - landmark.x  // 镜像 X 坐标
            }));
        }

        function updateDetectionStatus(landmarks) {
            const keyLandmarks = [11, 12, 23, 24, 25, 26, 27, 28];
            let visibleCount = 0;

            keyLandmarks.forEach(idx => {
                if (landmarks[idx] && landmarks[idx].visibility > 0.5) {
                    visibleCount++;
                }
            });

            document.getElementById('landmarkCount').textContent = landmarks.length;
            document.getElementById('visibleCount').textContent = visibleCount;

            if (visibleCount >= 6) {
                document.getElementById('detectionStatus').innerHTML = '<span class="status-indicator status-active"></span>已检测';
            } else {
                document.getElementById('detectionStatus').innerHTML = '<span class="status-indicator status-inactive"></span>检测中';
            }
        }

        function updateSkeletonInfo(landmarks) {
            let info = '';
            const landmarkNames = [
                '鼻子', '眼睛(内左)', '眼睛(外左)', '耳朵(左)',
                '眼睛(内右)', '眼睛(外右)', '耳朵(右)', '肩膀(左)',
                '手肘(左)', '手腕(左)', '肩膀(右)', '手肘(右)',
                '手腕(右)', '臀部(左)', '臀部(右)', '膝盖(左)',
                '脚踝(左)', '膝盖(右)', '脚踝(右)', '眼睛(下左)',
                '眼睛(上左)', '眼睛(下右)', '眼睛(上右)', '嘴巴(左)',
                '嘴巴(右)', '下巴', '胸部', '脊柱',
                '腰部', '髋部(左)', '髋部(右)', '膝盖(左)',
                '脚踝(左)', '膝盖(右)', '脚踝(右)', '脚(左)',
                '脚(右)'
            ];

            // 显示 MMD 映射的关键骨骼
            info += '=== MediaPipe → MMD 骨骼映射 ===\n';
            for (const [mpIndex, mmdBoneName] of Object.entries(MEDIAPIPE_TO_MMD_MAP)) {
                const idx = parseInt(mpIndex);
                const landmark = landmarks[idx];
                if (landmark && landmark.visibility > 0.5) {
                    const x = (landmark.x * 100).toFixed(1);
                    const y = (landmark.y * 100).toFixed(1);
                    const z = (landmark.z * 100).toFixed(1);
                    info += `[${idx}] ${landmarkNames[idx]} → ${mmdBoneName}: x=${x}%, y=${y}%, z=${z}%\n`;
                }
            }
            info += '\n';

            // 显示所有可见骨骼
            info += '=== 所有可见骨骼 ===\n';
            landmarks.forEach((landmark, index) => {
                const name = landmarkNames[index] || `点${index}`;
                const visibility = landmark.visibility.toFixed(2);
                const x = (landmark.x * 100).toFixed(1);
                const y = (landmark.y * 100).toFixed(1);
                const z = (landmark.z * 100).toFixed(1);

                if (landmark.visibility > 0.5) {
                    info += `[${index}] ${name}: x=${x}%, y=${y}%, z=${z}%, 可见性=${visibility}\n`;
                }
            });

            document.getElementById('skeletonInfo').textContent = info;
        }

        function drawSkeleton(ctx, landmarks, width, height) {
            const connections = [
                [12, 14], [14, 16], [11, 13], [13, 15],
                [11, 23], [24, 26], [26, 28], [23, 25], [25, 27],
                [0, 1], [1, 2], [2, 3], [3, 7], [0, 4], [4, 5], [5, 6], [6, 8],
                [9, 10], [17, 18], [19, 20], [21, 22], [29, 30], [31, 32]
            ];

            ctx.strokeStyle = '#38bdf8';
            ctx.lineWidth = 3;

            connections.forEach(([i, j]) => {
                if (landmarks[i] && landmarks[j]) {
                    const start = landmarks[i];
                    const end = landmarks[j];

                    if (start.visibility > 0.5 && end.visibility > 0.5) {
                        ctx.beginPath();
                        ctx.moveTo(start.x * width, start.y * height);
                        ctx.lineTo(end.x * width, end.y * height);
                        ctx.stroke();
                    }
                }
            });

            ctx.fillStyle = '#4ade80';
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;

            landmarks.forEach((landmark, index) => {
                if (landmark.visibility > 0.5) {
                    const x = landmark.x * width;
                    const y = landmark.y * height;

                    ctx.beginPath();
                    ctx.arc(x, y, 5, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.stroke();

                    if ([0, 1, 11, 12, 13, 14, 15, 16, 23, 24, 25, 26, 27, 28].includes(index)) {
                        ctx.fillStyle = '#ffffff';
                        ctx.font = '10px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText(index, x, y - 10);
                        ctx.fillStyle = '#4ade80';
                    }
                }
            });
        }

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                log('加载脚本: ' + src);
                const script = document.createElement('script');
                script.src = src;
                script.onload = () => {
                    log('脚本加载完成: ' + src);
                    resolve();
                };
                script.onerror = (err) => {
                    log('脚本加载失败: ' + src);
                    reject(err);
                };
                document.head.appendChild(script);
            });
        }

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
